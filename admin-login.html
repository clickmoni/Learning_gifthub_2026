<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ClickMoni Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{

background:#000;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

}

.card{

width:100%;

max-width:420px;

background:#111;

border:2px solid gold;

border-radius:18px;

padding:30px;

}

.logo{

text-align:center;

font-size:34px;

font-weight:bold;

color:gold;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#aaa;

margin-bottom:30px;

}

label{

display:block;

margin-bottom:8px;

font-weight:bold;

}

input{

width:100%;

padding:15px;

margin-bottom:20px;

background:#000;

border:1px solid #444;

border-radius:10px;

color:white;

font-size:16px;

}

button{

width:100%;

padding:15px;

background:gold;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#FFD54F;

}

#error{

margin-top:15px;

color:red;

text-align:center;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

ClickMoni Admin

</div>

<div class="subtitle">

Authorized Access Only

</div>

<label>

Admin Password

</label>

<input
type="password"
id="password"
placeholder="Enter Admin Password">

<button onclick="loginAdmin()">

Login

</button>

<div id="error"></div>

</div>

<script>

async function loginAdmin(){

const password=document.getElementById("password").value;

if(password===""){

document.getElementById("error").innerHTML="Enter password";

return;

}

const response=await fetch("/api/admin/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

password

})

});

const result=await response.json();

if(result.success){

localStorage.setItem(

"adminLoggedIn",

"true"

);

window.location.href="admin.html";

}else{

document.getElementById("error").innerHTML=result.message;

}

}

</script>

</body>

  </html>
