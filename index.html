<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickMoni — Earn Smart. Live Better.</title>
  <style>

    .btn { display:block; width:100%; padding:16px; border-radius:12px; text-decoration:none; font-weight:600; font-size:16px; margin:10px 0; border:none; }
