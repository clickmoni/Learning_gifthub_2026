<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ClickMoni</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
width:100%;
max-width:420px;
background:#111;
padding:25px;
border-radius:15px;
border:1px solid #FFD700;
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#FFD700;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#000;
border:1px solid #444;
border-radius:10px;
color:#fff;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#FFD700;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffcc00;
}

p{
margin-top:20px;
text-align:center;
}

a{
color:#FFD700;
text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<div class="logo">
ClickMoni
</div>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="loginUser()">
Login
</button>

<p>
Don't have an account?
<a href="signup.html">
Create Account
</a>
</p>

</div>

<script>

async function loginUser(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(!email||!password){

alert("Fill all fields");

return;

}

const response=await fetch("/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,

password

})

});

const result=await response.json();

if(result.success){

localStorage.setItem(
"currentUser",
result.user.email
);

window.location.href="dashboard.html";

}else{

alert(result.message);

}

}

</script>

</body>
  </html>
