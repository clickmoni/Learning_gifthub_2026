<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ClickMoni</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #000; 
            color: #fff; 
            padding: 15px; 
            padding-bottom: 90px;
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }
        .logo { color: #FFD700; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .logout { color: #FFD700; text-decoration: none; font-size: 13px; font-weight: 600; }
        .balance-card { 
            background: #111; 
            border: 2px solid #FFD700; 
            border-radius: 18px; 
            padding: 25px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .balance-card h2 { color: #888; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
        .balance { color: #FFD700; font-size: 38px; font-weight: 800; }
        .stats { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        .stat { 
            background: #0d0d0d; 
            border: 1px solid #FFD700; 
            border-radius: 14px; 
            padding: 18px 10px; 
            text-align: center; 
        }
        .stat p { color: #666; font-size: 11px; font-weight: 600; }
        .stat h3 { color: #FFD700; font-size: 20px; margin-top: 6px; font-weight: 700; }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 17px; 
            margin: 13px 0; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            text-decoration: none; 
            text-align: center; 
            cursor: pointer; 
        }
        .btn-gold { background: #FFD700; color: #000; }
        .btn-dark { background: #0d0d0d; color: #FFD700; border: 2px solid #FFD700; }
        .section-title { color: #FFD700; margin: 28px 0 12px 0; font-size: 15px; font-weight: 700; }
        .footer { text-align: center; margin-top: 35px; color: #444; font-size: 11px; }
        .footer a { color: #FFD700; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ClickMoni</div>
        <a href="index.html" class="logout" onclick="logout()">Logout</a>
    </div>

    <div class="balance-card">
        <h2>AVAILABLE BALANCE</h2>
        <div class="balance">₦<span id="balance">0</span></div>
    </div>

    <div class="stats">
        <div class="stat">
            <p>ACTIVE PLAN</p>
            <h3 id="pack">None</h3>
        </div>
        <div class="stat">
            <p>DAILY PROFIT</p>
            <h3>₦<span id="daily">0</span></h3>
        </div>
    </div>

    <h3 class="section-title">EARN MONEY</h3>
    <a href="tiers.html" class="btn btn-gold">🚀 Activate Plan</a>
    <a href="jobs.html" class="btn btn-gold">💼 Daily Jobs</a>
    <a href="sponsor.html" class="btn btn-gold">👥 Invite & Earn</a>
    <a href="withdraw.html" class="btn btn-dark">💸 Withdraw</a>

    <h3 class="section-title">COMMUNITY</h3>
    <a href="telegram.html" class="btn btn-gold">📢 Official Telegram</a>
    
    <h3 class="section-title">MORE</h3>
    <button class="btn btn-dark" onclick="comingSoon('Gift Card')">🎁 Gift Card</button>
    <button class="btn btn-dark" onclick="comingSoon('Ads Profile')">📊 Ads Profile</button>

    <div class="footer">
        ClickMoni Official | CEO: <a href="https://t.me/Monigold" target="_blank">@Monigold</a><br>
        <a href="https://t.me/ClickMoniOfficial" target="_blank">t.me/ClickMoniOfficial</a>
    </div>

    <script>
        document.getElementById('balance').textContent = localStorage.getItem('clickmoni_balance') || '0';
        document.getElementById('pack').textContent = localStorage.getItem('clickmoni_pack') || 'None';
        document.getElementById('daily').textContent = localStorage.getItem('clickmoni_daily') || '0';

        function logout() {
            localStorage.clear();
        }

        function comingSoon(feature) {
            alert(feature + ' Coming Soon!\n\nJoin @ClickMoniOfficial for updates.');
        }
    </script>
</body>
                                                                                  </html>
