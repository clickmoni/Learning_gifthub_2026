<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickMoni Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; padding: 15px; }
    .logo { color: #FFD700; font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 20px; }
    .tabs { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; }
    .tab { background: #111; color: #FFD700; border: 1px solid #FFD700; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .tab.active { background: #FFD700; color: #000; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .box { background: #111; border: 2px solid #FFD700; border-radius: 18px; padding: 20px; margin: 15px 0; }
    .box h3 { color: #FFD700; margin-bottom: 15px; }
    .item { background: #000; border: 1px solid #333; border-radius: 10px; padding: 15px; margin: 10px 0; }
    .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .item-user { color: #FFD700; font-weight: 700; }
    .item-amount { color: #00ff00; font-weight: 700; }
    .item-details { color: #aaa; font-size: 14px; line-height: 1.6; }
    .item-actions { display: flex; gap: 10px; margin-top: 12px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .btn-approve { background: #00ff00; color: #000; }
    .btn-reject { background: #ff0000; color: #fff; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
    .stat { background: #111; border: 1px solid #FFD700; border-radius: 14px; padding: 20px; text-align: center; }
    .stat p { color: #666; font-size: 12px; font-weight: 600; }
    .stat h3 { color: #FFD700; font-size: 24px; margin-top: 8px; }
    .link-box { background: #001a33; border: 1px solid #0088cc; border-radius: 8px; padding: 10px; margin: 8px 0; word-break: break-all; color: #00aaff; }
    </style>
</head>
<body>
    <div class="logo">ClickMoni Admin</div>

    <div class="stats">
        <div class="stat">
            <p>TOTAL USERS</p>
            <h3 id="totalUsers">0</h3>
        </div>
        <div class="stat">
            <p>PENDING JOBS</p>
            <h3 id="pendingJobs">0</h3>
        </div>
        <div class="stat">
            <p>PENDING WITHDRAWALS</p>
            <h3 id="pendingWithdraws">0</h3>
        </div>
        <div class="stat">
            <p>TOTAL PAID</p>
            <h3>₦<span id="totalPaid">0</span></h3>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('jobs')">Jobs/Profiles</div>
        <div class="tab" onclick="showTab('withdrawals')">Withdrawals</div>
        <div class="tab" onclick="showTab('users')">Users</div>
    </div>

    <div class="tab-content active" id="jobsTab">
        <div class="box">
            <h3>Pending Social Media Profiles & Jobs</h3>
            <div id="jobsList"></div>
        </div>
    </div>

    <div class="tab-content" id="withdrawalsTab">
        <div class="box">
            <h3>Pending Withdrawals</h3>
            <div id="withdrawalsList"></div>
        </div>
    </div>

    <div class="tab-content" id="usersTab">
        <div class="box">
            <h3>All Users</h3>
            <div id="usersList"></div>
        </div>
    </div>

    <script>
        window.onload = function() {
            loadStats();
            loadJobs();
            loadWithdrawals();
            loadUsers();
        };

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

            const users = JSON.parse(localStorage.getItem('clickmoni_users') || '[]');
