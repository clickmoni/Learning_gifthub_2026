<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickMoni Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #ef4444; margin: 20px 0; }
        .login { max-width: 400px; margin: 100px auto; background: #1e293b; padding: 30px; border-radius: 16px; }
        .login input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .btn { background: #ef4444; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { background: #ef4444; }
        .hidden { display: none; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
        .stat { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-num { font-size: 2rem; color: #ef4444; font-weight: 700; }
        .warning { background: #7f1d1d; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginBox" class="login">
            <h1>🔒 Admin Login</h1>
            <div class="warning">⚠️ Delete your secret key from public places after testing</div>
            <input type="password" id="adminPass" placeholder="@Mgbogo123">
            <button class="btn" onclick="login()">Login</button>
        </div>

        <div id="dashboard" class="hidden">
            <h1>ClickMoni Admin Dashboard</h1>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-num" id="totalUsers">0</div>
                    <div>Total Users</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="totalRevenue">₦0</div>
                    <div>Total Revenue</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="todayUsers">0</div>
                    <div>Today</div>
                </div>
            </div>

            <button class="btn" onclick="loadFromPaystack()" style="width: auto; margin: 20px 0;">🔄 Refresh from Paystack</button>
            
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Plan</th>
                        <th>Amount</th>
                        <th>Bank</th>
                        <th>Referred By</th>
                        <th>Reference</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <tr><td colspan="9" style="text-align: center; padding: 40px;">Click "Refresh from Paystack" to load users</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "@Mgbogo123"; 
        const PAYSTACK_SECRET_KEY = "sk_live_bf9b2305f5f7042e4e9f0c6baa9c936d3157665c";

        function login() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadFromPaystack();
            } else {
                alert('Wrong password');
            }
        }

        async function loadFromPaystack() {
            const table = document.getElementById('userTable');
            table.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">Loading...</td></tr>';

            try {
                const res = await fetch('https://api.paystack.co/transaction?perPage=100', {
                    headers: { 'Authorization': `Bearer ${PAYSTACK_SECRET_KEY}` }
                });
                const data = await res.json();
                
                if (data.status) {
                    const transactions = data.data.filter(t => t.status === 'success' && t.metadata?.custom_fields);
                    displayUsers(transactions);
                } else {
                    table.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: #ef4444;">Paystack Error: Check your Secret Key</td></tr>';
                }
            } catch (err) {
                table.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: #ef4444;">Error loading. Check your Secret Key or internet.</td></tr>';
            }
        }

        function displayUsers(transactions) {
            const table = document.getElementById('userTable');
            let totalRevenue = 0;
            let todayCount = 0;
            const today = new Date().toDateString();

            if (transactions.length === 0) {
                table.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">No payments yet</td></tr>';
                return;
            }

            table.innerHTML = '';
            transactions.forEach(t => {
                const fields = {};
                t.metadata.custom_fields.forEach(f => fields[f.variable_name] = f.value);
                
                totalRevenue += t.amount;
                if (new Date(t.created_at).toDateString() === today) todayCount++;

                const row = `
                    <tr>
                        <td>${new Date(t.created_at).toLocaleDateString()}</td>
                        <td>${fields.full_name || '-'}</td>
                        <td>${t.customer.email}</td>
                        <td>${fields.phone || '-'}</td>
                        <td>${fields.plan || '-'}</td>
                        <td>₦${(t.amount/100).toLocaleString()}</td>
                        <td>${fields.bank_name || '-'} ${fields.bank_account || ''}</td>
                        <td>${fields.referred_by || '-'}</td>
                        <td>${t.reference}</td>
                    </tr>
                `;
                table.innerHTML += row;
            });

            document.getElementById('totalUsers').textContent = transactions.length;
            document.getElementById('totalRevenue').textContent = '₦' + (totalRevenue/100).toLocaleString();
            document.getElementById('todayUsers').textContent = todayCount;
        }
    </script>
</body>
</html>
