<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ClickMoni</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
            background: #0f172a; 
            color: white; 
            padding: 20px; 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #ef4444; margin: 20px 0; text-align: center; }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin: 30px 0; 
        }
        .stat-card { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-number { font-size: 2rem; color: #ef4444; font-weight: bold; }
        .stat-label { color: #94a3b8; margin-top: 8px; }
        .controls { 
            display: flex; 
            gap: 15px; 
            margin: 20px 0; 
            flex-wrap: wrap;
        }
        .btn { 
            background: #ef4444; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #dc2626; }
        .btn-secondary { background: #334155; }
        .btn-secondary:hover { background: #475569; }
        input { 
            background: #1e293b; 
            border: 1px solid #334155; 
            color: white; 
            padding: 12px; 
            border-radius: 8px;
            flex: 1;
            min-width: 200px;
        }
        table { 
            width: 100%; 
            background: #1e293b; 
            border-radius: 12px; 
            overflow: hidden;
            border-collapse: collapse;
        }
        th, td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid #334155; 
        }
        th { background: #0f172a; color: #ef4444; }
        .status-success { color: #22c55e; font-weight: 600; }
        .status-failed { color: #ef4444; font-weight: 600; }
        .error-box { 
            background: #7f1d1d; 
            border: 1px solid #ef4444; 
            padding: 20px; 
            border-radius: 8px; 
            margin: 20px 0;
        }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ClickMoni Admin Dashboard 👑</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalRevenue">₦0</div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Successful Payments</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeSubs">0</div>
                <div class="stat-label">Active Subscriptions</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="loadTransactions()">🔄 Refresh Data</button>
            <input type="text" id="searchInput" placeholder="Search by email or social handle..." onkeyup="filterTable()">
            <button class="btn btn-secondary" onclick="exportCSV()">📥 Export CSV</button>
        </div>

        <div id="errorContainer"></div>
        <table id="transactionsTable" style="display:none;">
    <thead>
        <tr>
            <th>Date</th>
            <th>Email</th>
            <th>Social Handle</th>
            <th>Plan</th>
            <th>Amount</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody id="tableBody"></tbody>
        </table>
        
        <h2 style="margin-top:40px;color:#ef4444;">Pending Withdrawals</h2>

<table id="withdrawalsTable">
    <thead>
        <tr>
            <th>Email</th>
            <th>Amount</th>
            <th>Bank</th>
            <th>Account Name</th>
            <th>Account Number</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="withdrawalsBody"></tbody>
</table>
                
                
        
    </div>

    <script>
        // ✅ VERCEL URL SET — REPLACE 'clickmoni3' WITH YOUR ACTUAL VERCEL PROJECT NAME
        const API_URL = 'https://learning-gifthub-2026.pages.dev/api/transactions';
        
        let allTransactions = [];

        async function loadTransactions() {
            const errorContainer = document.getElementById('errorContainer');
            const loadingContainer = document.getElementById('loadingContainer');
            const table = document.getElementById('transactionsTable');
            
            errorContainer.innerHTML = '';
            loadingContainer.style.display = 'block';
            table.style.display = 'none';

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}. Check if /functions/api/transactions.js exists in Cloudflare Pages and PAYSTACK_SECRET_KEY is set.`);
                }
                
                const result = await response.json();
                
                if (!result.status) {
                    throw new Error(result.message || 'Paystack API error. Check your secret key in Vercel env vars.');
                }

                allTransactions = result.data || [];
                displayTransactions(allTransactions);
                updateStats(allTransactions);
                
                loadingContainer.style.display = 'none';
                table.style.display = 'table';

            } catch (error) {
                loadingContainer.style.display = 'none';
                errorContainer.innerHTML = `
                    <div class="error-box">
                        <strong>❌ Error Loading Data:</strong><br>
                        ${error.message}<br><br>
                        <strong>How to fix:</strong><br>
1. Confirm your Cloudflare Pages URL is correct: ${API_URL}<br>
2. Check Cloudflare Pages → Settings → Environment Variables → PAYSTACK_SECRET_KEY exists<br>
3. Check that functions/api/transactions.js exists in GitHub<br>
4. Wait for Cloudflare to finish deploying after every commit<br>
5. Test the API directly:
<a href="${API_URL}" target="_blank" style="color:#fca5a5;">Open API URL</a>
        
                    
                    
                
                `;
            }
        }

        function displayTransactions(transactions) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            transactions.forEach(txn => {
                const row = document.createElement('tr');
                const date = new Date(txn.created_at).toLocaleDateString('en-NG');
                const amount = `₦${(txn.amount / 100).toLocaleString()}`;
                const socialHandle = txn.metadata?.social_handle || 'Not provided';
                const plan = txn.metadata?.plan || 'Unknown';
                const statusClass = txn.status === 'success' ? 'status-success' : 'status-failed';
                
                row.innerHTML = `
                    <td>${date}</td>
                    <td>${txn.customer.email}</td>
                    <td>${socialHandle}</td>
                    <td>${plan}</td>
                    <td>${amount}</td>
                    <td class="${statusClass}">${txn.status}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats(transactions) {
            const successful = transactions.filter(t => t.status === 'success');
            const totalRevenue = successful.reduce((sum, t) => sum + t.amount, 0) / 100;
            
            document.getElementById('totalRevenue').textContent = `₦${totalRevenue.toLocaleString()}`;
            document.getElementById('totalUsers').textContent = successful.length;
            document.getElementById('activeSubs').textContent = successful.length;
        }

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTransactions.filter(txn => 
                txn.customer.email.toLowerCase().includes(search) ||
                (txn.metadata?.social_handle || '').toLowerCase().includes(search)
            );
            displayTransactions(filtered);
        }

        function exportCSV() {
            let csv = 'Date,Email,Social Handle,Plan,Amount,Status\n';
            allTransactions.forEach(txn => {
                const date = new Date(txn.created_at).toLocaleDateString('en-NG');
                const amount = txn.amount / 100;
                const socialHandle = txn.metadata?.social_handle || '';
                const plan = txn.metadata?.plan || '';
                csv += `${date},${txn.customer.email},${socialHandle},${plan},${amount},${txn.status}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `clickmoni-transactions-${Date.now()}.csv`;
            a.click();
        }

        const WITHDRAW_API =
"https://learning-gifthub-2026.pages.dev/api/withdrawals";

async function loadWithdrawals() {
    try {
        const response = await fetch(WITHDRAW_API);
        const result = await response.json();

        if (!result.success) return;

        const body = document.getElementById("withdrawalsBody");
        body.innerHTML = "";

        result.withdrawals.forEach(w => {
            body.innerHTML += `
                <tr>
                    <td>${w.email}</td>
                    <td>₦${Number(w.amount).toLocaleString()}</td>
                    <td>${w.bank_name}</td>
                    <td>${w.account_name}</td>
                    <td>${w.account_number}</td>
                    <td>${w.status}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.error(err);
    }
        }
        // Load on page open
loadTransactions();
loadWithdrawals();
        
    </script>
</body>
                        </html>
