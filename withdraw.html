 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw - ClickMoni</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
padding-bottom:100px;
}

.container{
max-width:700px;
margin:auto;
}

.logo{
text-align:center;
font-size:36px;
font-weight:bold;
color:#FFD700;
margin-bottom:20px;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#FFD700;
text-decoration:none;
font-weight:bold;
}

.card{
background:#111;
border:1px solid #FFD700;
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

h2{
color:#FFD700;
margin-bottom:15px;
}

.balance{
font-size:35px;
font-weight:bold;
color:#00ff66;
text-align:center;
margin:15px 0;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:15px;
text-align:center;
background:#111;
border:1px solid #FFD700;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:#FFD700;
color:#000;
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

input,
select{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
background:#000;
color:#fff;
border:1px solid #555;
border-radius:10px;
}

button{
width:100%;
padding:15px;
background:#FFD700;
color:#000;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#555;
color:#999;
cursor:not-allowed;
}

.historyItem{
background:#111;
border:1px solid #444;
border-radius:10px;
padding:15px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<a href="dashboard.html" class="back">
← Back
</a>

<div class="logo">
ClickMoni
</div>

<div class="tabs">

<div
class="tab active"
id="taskTabBtn">
Task Balance
</div>

<div
class="tab"
id="affiliateTabBtn">
Affiliate Balance
</div>

</div>

<div
class="tab-content active"
id="taskTab">

</div>

<div
class="tab-content"
id="affiliateTab">

</div>

<div class="card">

<h2>
Withdrawal History
</h2>

<div id="history">

Loading...

</div>

</div>

</div>

<script>

const email =
localStorage.getItem("currentUser") ||
localStorage.getItem("clickmoni_email");

if(!email){

window.location.href="login.html";

}

</script>

</body>

</html>
