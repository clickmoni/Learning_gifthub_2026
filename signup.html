<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - ClickMoni</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#111;color:#fff;padding:20px}
.container{max-width:500px;margin:auto}
.logo{text-align:center;font-size:32px;font-weight:bold;color:#FF3B30;margin:20px 0 10px}
.subtitle{text-align:center;color:#bbb;margin-bottom:25px}
.form-box{background:#1d1d1d;padding:20px;border-radius:15px}
.input-group{margin-bottom:15px}
label{display:block;margin-bottom:6px;color:#ccc}
input{width:100%;padding:14px;background:#000;color:#fff;border:1px solid #333;border-radius:10px}
button{width:100%;padding:15px;background:#FF3B30;color:#fff;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
button:disabled{opacity:.6}
.login-link{text-align:center;margin-top:20px}
.login-link a{color:#FF3B30;text-decoration:none}
</style>
</head>
<body>
<div class="container">
<div class="logo">ClickMoni</div>
<p class="subtitle">Create your ClickMoni account</p>
<div class="form-box">
<form id="signupForm">
<div class="input-group"><label>First Name</label><input id="firstName" required></div>
<div class="input-group"><label>Last Name</label><input id="lastName" required></div>
<div class="input-group"><label>Username</label><input id="username" required></div>
<div class="input-group"><label>Email</label><input id="email" type="email" required></div>
<div class="input-group"><label>Phone</label><input id="phone" required></div>
<div class="input-group"><label>Referral Code (Optional)</label><input id="affiliate"></div>
<div class="input-group"><label>Password</label><input id="password" type="password" required></div>
<button id="signupBtn" type="submit">Create Account</button>
</form>
<div class="login-link">Already have an account? <a href="index.html">Login</a></div>
</div></div>
<script>
const params=new URLSearchParams(location.search);
const ref=params.get("ref");
if(ref) document.getElementById("affiliate").value=ref;

document.getElementById("signupForm").addEventListener("submit",async(e)=>{
e.preventDefault();
const btn=document.getElementById("signupBtn");
btn.disabled=true; btn.textContent="Creating Account...";
const data={
 firstName:firstName.value.trim(),
 lastName:lastName.value.trim(),
 username:username.value.trim(),
 email:email.value.trim(),
 phone:phone.value.trim(),
 password:password.value,
 affiliate:affiliate.value.trim()
};
try{
 const r=await fetch("/api/register",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(data)
 });
 const result=await r.json();
 if(result.success){
   localStorage.setItem("currentUser",data.email);
   alert("Account created successfully!");
   location.href="dashboard.html";
 }else{
   btn.disabled=false; btn.textContent="Create Account";
   alert(result.message);
 }
}catch(err){
 btn.disabled=false; btn.textContent="Create Account";
 alert("Unable to connect to the server.");
 console.error(err);
}
});
</script>
</body>
  </html>
